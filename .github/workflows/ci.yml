name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dataflow_ci
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run db:generate
      - run: npm run lint
      - run: npm run test
      - run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dataflow_ci?schema=public
          AUTH_SECRET: test-secret-that-is-long-enough-for-ci
          REDIS_URL: redis://localhost:6379
